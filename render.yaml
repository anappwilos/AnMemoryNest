services:
  - type: web
    name: anmemorynest
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_DEMO_EMAIL
        value: root@root.com
